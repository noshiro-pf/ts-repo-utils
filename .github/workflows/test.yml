name: Test and Upload Coverage to Codecov

# Controls when the action will run.
on:
  # Triggers the workflow on push events (excluding develop branches) and manual runs
  push:
    branches-ignore:
      - 'develop'
      - 'develop*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Allow Codecov OIDC upload and minimal read access
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: true
      matrix:
        command:
          - test
          - test:cov

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch main
        run: git fetch origin main # To allow check-should-run-type-checks to get the diff from main

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup_node_id
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: To include this workflow in the branch protection rule status check,
      # skip each step instead of skipping the entire workflow with paths-ignore.
      - name: Check diff
        id: check_diff_type
        run: pnpm exec check-should-run-type-checks

      - name: Exit if no relevant changes
        if: steps.check_diff_type.outputs.should_run != 'true'
        run: exit 0

      - name: Run "${{ matrix.command }}"
        run: pnpm run ${{ matrix.command }}

      - name: Upload coverage reports to Codecov
        if: matrix.command == 'test:cov'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: true
          # Use OIDC-based auth (works for forks; no secret required)
          use_oidc: true
          # Point explicitly to lcov report generated by Vitest
          files: ./coverage/lcov.info
          # Avoid scanning the whole workspace
          disable_search: true
          verbose: true
